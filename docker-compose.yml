version: '3.8'

services:
  # // NOTE: The single "app" service now handles both PHP and Nginx (Fat Container)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: invent-mag-app
    container_name: invent-mag-app
    restart: unless-stopped
    working_dir: /var/www
    ports:
      - "8000:80" # // NOTE: Map local 8000 to container 80 (where Nginx lives)
    volumes:
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
    environment:
      APP_NAME: "${APP_NAME:-Invent-MAG}"
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-invent_mag_be}"
      DB_USERNAME: "${DB_USERNAME:-root}"
      DB_PASSWORD: "${DB_PASSWORD:-}"
    depends_on:
      - db
    networks:
      - invent-mag-network

  # The Database (MySQL)
  db:
    image: mysql:8.0
    container_name: invent-mag-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-invent_mag_be}"
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_ROOT_PASSWORD: ""
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - invent-mag-network

networks:
  invent-mag-network:
    driver: bridge

volumes:
  dbdata:
